{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">Регистрация</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" name="username" class="form-control" required>
                        <small class="form-text text-muted">Придумайте уникальное имя пользователя</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                        <small class="form-text text-muted">Введите ваш email адрес</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password1" class="form-control" required>
                        <small class="form-text text-muted">Пароль должен содержать минимум 8 символов</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Подтверждение пароля</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                </form>
                <p class="text-center mt-3">
                    Уже есть аккаунт? <a href="{% url 'shop:login' %}">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
