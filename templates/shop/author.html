{% extends 'base.html' %}

{% block title %}Об авторе{% endblock %}

{% block content %}
<div class="product-card" style="max-width: 700px; margin: 0 auto; padding: 40px;">
    <h1 style="text-align: center; color: #667eea; margin-bottom: 40px;">👤 Об авторе проекта</h1>
    
    <div style="background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%); padding: 30px; border-radius: 15px; margin-bottom: 25px;">
        <h3 style="color: #764ba2; margin-bottom: 20px;">📋 Основная информация</h3>
        
        <div style="margin-bottom: 15px;">
            <strong style="color: #667eea; display: block; margin-bottom: 5px;">ФИО:</strong>
            <p style="color: #5a5a5a; font-size: 16px;">Короленко Ульяна Сергеевна</p>
        </div>
        
        <div style="margin-bottom: 15px;">
            <strong style="color: #667eea; display: block; margin-bottom: 5px;">Группа:</strong>
            <p style="color: #5a5a5a; font-size: 16px;">87ТП</p>
        </div>


    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap;">
        <a href="{% url 'shop:home' %}" class="btn">🏠 На главную</a>
        <a href="{% url 'shop:about' %}" class="btn btn-success">ℹ️ О магазине</a>
    </div>
</div>
{% endblock %}
